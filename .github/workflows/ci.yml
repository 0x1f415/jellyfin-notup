name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'manifest.json'   # manifest-update commits must not trigger a new CI run
  pull_request:
    branches: [master]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Web (config page) ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build config page
        working-directory: web
        run: npm install && npm run build

      # ── .NET ───────────────────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.NextUpFilter
          path: bin/Release/net8.0/Jellyfin.Plugin.NextUpFilter.dll
          retention-days: 7
