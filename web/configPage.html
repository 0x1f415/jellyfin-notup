<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Next Up Filter</title>
</head>
<body>
  <!--
    Jellyfin identifies this as a plugin config page via the data-role and
    pluginConfigurationPage class. The content-primary div is where
    Jellyfin's dashboard styles apply.

    Note: Jellyfin fetches this page and injects the body contents into its
    shell. The full <html>/<body> wrapper is stripped; only the inner divs
    and scripts survive.
  -->
  <div
    id="NextUpFilterConfigPage"
    data-role="page"
    class="page type-interior pluginConfigurationPage"
    data-require="emby-input,emby-button,emby-select"
  >
    <div data-role="content">
      <div class="content-primary">
        <div id="root"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
