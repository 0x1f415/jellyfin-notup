<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Next Up Filter</title>
</head>
<body>

<div id="NextUpFilterConfigPage"
     data-role="page"
     class="page type-interior pluginConfigurationPage"
     data-require="emby-input,emby-button,emby-select">

  <div data-role="content">
    <div class="content-primary">

      <form id="nufForm">

        <div class="verticalSection">
          <div class="sectionTitleContainer">
            <h2 class="sectionTitle">Next Up Filter</h2>
          </div>
        </div>

        <!-- User picker -->
        <div class="inputContainer">
          <label class="inputLabel inputLabelUnfocused" for="nuf-user">Configure for user</label>
          <select id="nuf-user" class="emby-select-withcolor emby-select"></select>
        </div>

        <!-- Search -->
        <div class="inputContainer" style="position:relative">
          <label class="inputLabel inputLabelUnfocused" for="nuf-search">
            Add series, playlist, or collection
          </label>
          <input id="nuf-search" type="text" class="emby-input"
                 placeholder="Search..." autocomplete="off">
          <div id="nuf-results" style="
            display:none;
            position:absolute;
            z-index:100;
            background:var(--theme-bg-color,#1c1c1c);
            border:1px solid rgba(255,255,255,.15);
            border-radius:4px;
            width:100%;
            max-height:280px;
            overflow-y:auto;
            box-shadow:0 4px 16px rgba(0,0,0,.5);
          "></div>
        </div>

        <!-- Chip list -->
        <div id="nuf-chips" style="display:flex;flex-wrap:wrap;gap:8px;margin:0 0 24px"></div>

        <button type="submit" class="raised button-submit block emby-button">
          <span>Save</span>
        </button>

      </form>

    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var PLUGIN_ID = 'a8e7d6c5-b4a3-4e2f-9d1b-c0e8f7a6d5b4';

  var TYPE_LABEL = { Series: 'Series', Playlist: 'Playlist', BoxSet: 'Collection' };
  var TYPE_COLOR = { Series: '#1db954', Playlist: '#1a78c2', BoxSet: '#c2691a' };

  // ── State ──────────────────────────────────────────────────────────────────
  var fullConfig     = { UserSettings: [] };
  var selectedUserId = '';
  var currentItems   = [];   // ExclusionEntry[] for the selected user
  var searchTimer    = null;

  // ── DOM refs (assigned in onPageShow) ──────────────────────────────────────
  var elUser, elSearch, elResults, elChips;

  // ── Entry point ────────────────────────────────────────────────────────────
  document.getElementById('NextUpFilterConfigPage')
    .addEventListener('pageshow', onPageShow);

  function onPageShow() {
    elUser    = document.getElementById('nuf-user');
    elSearch  = document.getElementById('nuf-search');
    elResults = document.getElementById('nuf-results');
    elChips   = document.getElementById('nuf-chips');

    elUser.addEventListener('change', function () {
      saveCurrentUserToConfig();
      selectedUserId = elUser.value;
      loadUserItems();
      renderChips();
    });

    elSearch.addEventListener('input', function () {
      clearTimeout(searchTimer);
      var q = elSearch.value.trim();
      if (q.length < 2) { hideResults(); return; }
      searchTimer = setTimeout(function () { runSearch(q); }, 300);
    });

    elSearch.addEventListener('blur', function () {
      // Delay so mousedown on a result row fires before the list hides.
      setTimeout(hideResults, 200);
    });

    document.getElementById('nufForm').addEventListener('submit', onSubmit);

    Dashboard.showLoadingMsg();

    Promise.all([
      ApiClient.getUsers(),
      ApiClient.getPluginConfiguration(PLUGIN_ID),
    ]).then(function (results) {
      var users  = results[0];
      var config = results[1];

      fullConfig = config || { UserSettings: [] };
      if (!Array.isArray(fullConfig.UserSettings)) fullConfig.UserSettings = [];

      // Populate user picker.
      elUser.innerHTML = '';
      users.forEach(function (u) {
        var opt = document.createElement('option');
        opt.value       = u.Id;
        opt.textContent = u.Name;
        elUser.appendChild(opt);
      });

      // Default to the currently logged-in user.
      var currentId = ApiClient.getCurrentUserId();
      var match = users.find(function (u) {
        return u.Id.toLowerCase() === currentId.toLowerCase();
      });
      selectedUserId = match ? match.Id : (users[0] ? users[0].Id : '');
      elUser.value = selectedUserId;

      loadUserItems();
      renderChips();
    }).catch(function (err) {
      console.error('NextUpFilter: failed to load config', err);
    }).finally(function () {
      Dashboard.hideLoadingMsg();
    });
  }

  // ── Per-user helpers ───────────────────────────────────────────────────────

  function getUserSetting(userId) {
    var key = userId.toLowerCase();
    return fullConfig.UserSettings.find(function (s) { return s.UserId === key; });
  }

  function loadUserItems() {
    var s = getUserSetting(selectedUserId);
    currentItems = s ? (s.ExclusionItems || []).slice() : [];
  }

  function saveCurrentUserToConfig() {
    var key = selectedUserId.toLowerCase();
    fullConfig.UserSettings = fullConfig.UserSettings.filter(function (s) {
      return s.UserId !== key;
    });
    fullConfig.UserSettings.push({ UserId: key, ExclusionItems: currentItems.slice() });
  }

  // ── Chips ──────────────────────────────────────────────────────────────────

  function renderChips() {
    elChips.innerHTML = '';
    currentItems.forEach(function (item) {
      elChips.appendChild(makeChip(item));
    });
  }

  function makeChip(item) {
    var chip = document.createElement('div');
    chip.style.cssText = [
      'display:inline-flex', 'align-items:center', 'gap:6px',
      'padding:4px 10px', 'border-radius:16px',
      'background:rgba(255,255,255,.1)', 'font-size:.85em',
    ].join(';');

    var badge = document.createElement('span');
    badge.textContent = TYPE_LABEL[item.Type] || item.Type;
    badge.style.cssText = [
      'font-size:.75em', 'padding:1px 6px', 'border-radius:10px',
      'background:' + (TYPE_COLOR[item.Type] || '#555'),
      'color:#fff', 'font-weight:600',
    ].join(';');

    var nameEl = document.createElement('span');
    nameEl.textContent = item.Name || item.Id;

    var removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.textContent = '×';
    removeBtn.style.cssText = [
      'background:none', 'border:none', 'color:inherit',
      'cursor:pointer', 'font-size:1.1em', 'padding:0 0 0 4px', 'line-height:1',
    ].join(';');
    removeBtn.addEventListener('click', function () {
      currentItems = currentItems.filter(function (i) { return i.Id !== item.Id; });
      renderChips();
    });

    chip.appendChild(badge);
    chip.appendChild(nameEl);
    chip.appendChild(removeBtn);
    return chip;
  }

  // ── Search ─────────────────────────────────────────────────────────────────

  function runSearch(query) {
    ApiClient.getItems(ApiClient.getCurrentUserId(), {
      SearchTerm: query,
      IncludeItemTypes: 'Series,Playlist,BoxSet',
      Recursive: true,
      Limit: 8,
      Fields: 'BasicSyncInfo',
    }).then(function (result) {
      renderResults(result.Items || []);
    }).catch(function () {
      hideResults();
    });
  }

  function renderResults(items) {
    elResults.innerHTML = '';
    if (!items.length) { hideResults(); return; }

    items.forEach(function (item) {
      var row = document.createElement('div');
      row.style.cssText = [
        'display:flex', 'align-items:center', 'gap:8px',
        'padding:8px 12px', 'cursor:pointer',
      ].join(';');
      row.addEventListener('mouseenter', function () {
        row.style.background = 'rgba(255,255,255,.08)';
      });
      row.addEventListener('mouseleave', function () {
        row.style.background = '';
      });

      var badge = document.createElement('span');
      badge.textContent = TYPE_LABEL[item.Type] || item.Type;
      badge.style.cssText = [
        'font-size:.72em', 'padding:1px 6px', 'border-radius:10px', 'flex-shrink:0',
        'background:' + (TYPE_COLOR[item.Type] || '#555'),
        'color:#fff', 'font-weight:600',
      ].join(';');

      var nameEl = document.createElement('span');
      nameEl.textContent = item.Name;
      nameEl.style.overflow     = 'hidden';
      nameEl.style.textOverflow = 'ellipsis';
      nameEl.style.whiteSpace   = 'nowrap';

      row.appendChild(badge);
      row.appendChild(nameEl);

      row.addEventListener('mousedown', function () {
        var alreadyAdded = currentItems.some(function (i) { return i.Id === item.Id; });
        if (!alreadyAdded) {
          currentItems.push({ Type: item.Type, Id: item.Id, Name: item.Name });
          renderChips();
        }
        elSearch.value = '';
        hideResults();
      });

      elResults.appendChild(row);
    });

    elResults.style.display = 'block';
  }

  function hideResults() {
    elResults.style.display = 'none';
    elResults.innerHTML = '';
  }

  // ── Save ───────────────────────────────────────────────────────────────────

  function onSubmit(e) {
    e.preventDefault();
    Dashboard.showLoadingMsg();
    saveCurrentUserToConfig();

    ApiClient.updatePluginConfiguration(PLUGIN_ID, fullConfig)
      .then(function (result) {
        Dashboard.processPluginConfigurationUpdateResult(result);
      })
      .catch(function (err) {
        console.error('NextUpFilter: failed to save config', err);
        Dashboard.hideLoadingMsg();
      });
  }

})();
</script>

</body>
</html>
